<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4fb8ff"/>
      <stop offset="100%" stop-color="#2edb8c"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#2edb8c"/>
      <stop offset="100%" stop-color="#1fc87a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedClip">
      <rect x="3" y="3" width="114" height="114" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <!-- Gradient border (outer rounded rect) -->
  <rect x="1" y="1" width="118" height="118" rx="26" ry="26"
        fill="none" stroke="url(#borderGrad)" stroke-width="2.5"/>

  <!-- Dark background -->
  <rect x="3" y="3" width="114" height="114" rx="24" ry="24" fill="#0e1118"/>

  <!-- Left bracket < -->
  <g clip-path="url(#roundedClip)">
    <text x="18" y="72" font-family="'SF Mono', 'Fira Code', monospace"
          font-size="36" font-weight="300" fill="#5a6478" letter-spacing="-2">&lt;</text>

    <!-- Right bracket > -->
    <text x="78" y="72" font-family="'SF Mono', 'Fira Code', monospace"
          font-size="36" font-weight="300" fill="#5a6478">&gt;</text>

    <!-- Checkmark glow layer -->
    <polyline points="36,62 50,76 82,44"
              fill="none" stroke="#2edb8c" stroke-width="7"
              stroke-linecap="round" stroke-linejoin="round"
              filter="url(#softGlow)" opacity="0.55"/>

    <!-- Checkmark main -->
    <polyline points="36,62 50,76 82,44"
              fill="none" stroke="url(#checkGrad)" stroke-width="5.5"
              stroke-linecap="round" stroke-linejoin="round"
              filter="url(#glow)"/>
  </g>
</svg>
